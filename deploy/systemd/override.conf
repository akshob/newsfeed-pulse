[Service]
# Keep existing OLLAMA_MODELS path on SSD.
Environment="OLLAMA_MODELS=/mnt/butterscotch/ollama/models"

# Lower priority so background catchup-all work doesn't thrash the system.
# Nice=10 deprioritizes Ollama under CPU contention.
# CPUQuota caps Ollama at the equivalent of ~5 cores (out of 12 threads),
# leaving plenty of headroom for user work (Plex, Jellyfin, Vapor, etc).
Nice=10
CPUWeight=50
CPUQuota=500%
IOSchedulingClass=idle

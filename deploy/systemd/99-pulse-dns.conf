[Resolve]
# Bypass pi-hole for hydrogen's own DNS so cron-driven ingests don't stall
# when pi-hole is unreachable (it's a single point of failure on 192.168.68.1).
DNS=1.1.1.1 8.8.8.8
FallbackDNS=9.9.9.9 1.0.0.1
Cache=yes
# Re-enable the stub so glibc apps (including Swift NIO) can benefit from
# systemd-resolved's caching + parallel retry across DNS servers.
DNSStubListener=yes
